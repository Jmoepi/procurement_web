name: Daily Tender Crawler

on:
  schedule:
    # Run at 07:00 SAST (05:00 UTC) every day
    - cron: '0 5 * * *'
  workflow_dispatch:
    inputs:
      tenant_id:
        description: 'Specific tenant ID to process (leave empty for all)'
        required: false
        type: string
      dry_run:
        description: 'Dry run (no database writes or emails)'
        required: false
        type: boolean
        default: false

env:
  PYTHON_VERSION: '3.12'
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
  RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}

jobs:
  crawl:
    name: Run Daily Crawler
    runs-on: ubuntu-latest
    environment: Production
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('crawler/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        working-directory: ./crawler
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Debug - Check environment variables
        run: |
          echo "Checking if secrets are set..."
          if [ -n "$SUPABASE_URL" ]; then echo "✓ SUPABASE_URL is set"; else echo "✗ SUPABASE_URL is NOT set"; fi
          if [ -n "$SUPABASE_SERVICE_ROLE_KEY" ]; then echo "✓ SUPABASE_SERVICE_ROLE_KEY is set"; else echo "✗ SUPABASE_SERVICE_ROLE_KEY is NOT set"; fi
          if [ -n "$RESEND_API_KEY" ]; then echo "✓ RESEND_API_KEY is set"; else echo "✗ RESEND_API_KEY is NOT set"; fi
        env:
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}

      - name: Run crawler
        working-directory: ./crawler
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          ARGS=""
          if [ -n "${{ inputs.tenant_id }}" ]; then
            ARGS="$ARGS --tenant-id ${{ inputs.tenant_id }}"
          fi
          if [ "${{ inputs.dry_run }}" == "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          python -m crawler.run_daily $ARGS

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crawler-logs-${{ github.run_number }}
          path: crawler/logs/
          retention-days: 7
          if-no-files-found: ignore

  notify-on-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: crawl
    if: failure()

    steps:
      - name: Send failure notification
        uses: actions/github-script@v7
        with:
          script: |
            const message = `🚨 Daily Tender Crawler Failed!
            
            Workflow: ${context.workflow}
            Run: ${context.runNumber}
            Repository: ${context.repo.owner}/${context.repo.repo}
            
            Please check the logs: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            
            console.log(message);
            
            // Could add Slack/Discord notification here
